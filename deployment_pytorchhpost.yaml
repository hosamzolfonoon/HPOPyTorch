apiVersion: v1
kind: Service
metadata:
  name: pytorchhpost
  labels:
    app: pytorchhpost
spec:
  ports:
    - port: 80  # Target port for the pytorchhpost application
      targetPort: 8501
      nodePort: 30007  # Optional: Specify a NodePort (range: 30000-32767)
  selector:
    app: pytorchhpost
    tier: frontend
  type: NodePort  # Changed from LoadBalancer to NodePort

---

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pytorchhpost-pv-claim
  labels:
    app: pytorchhpost
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: pytorchhpost
  labels:
    app: pytorchhpost
spec:
  selector:
    matchLabels:
      app: pytorchhpost
      tier: frontend
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: pytorchhpost
        tier: frontend
    spec:
      containers:
      - image: hosamzolfonoon/pytorchhpost:260614
        imagePullPolicy: Always
        name: pytorchhpost
        resources:
          requests:
            cpu: "400m"
            memory: "1Gi"
            nvidia.com/gpu: 1
          limits:
            cpu: "2"
            memory: "4Gi"
            nvidia.com/gpu: 1
        command: ["nginx", "-g", "daemon off;"]  # Keeps Nginx running in the foreground
        ports:
        - containerPort: 80
          name: pytorchhpost
        
        volumeMounts:
        - name: pytorchhpost-persistent-storage
          mountPath: /var/www/html
      
      volumes:
      - name: pytorchhpost-persistent-storage
        persistentVolumeClaim:
          claimName: pytorchhpost-pv-claim
          